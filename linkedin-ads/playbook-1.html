<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="https://www.revenuagency.io" class="brand-logo">REVENU</a>

          <button class="dropdown-trigger" type="button" id="platform-dropdown-trigger" aria-haspopup="listbox" aria-expanded="false">

          </button>
          <div class="dropdown-menu" id="platform-dropdown-menu" role="listbox"></div>
        </div>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h1 class="hero-title" id="hero-title">
        <span class="hero-title-accent">LinkedIn Ads</span> Library
      </h1>
      <div class="feature-pills" id="feature-pills"></div>

  <div class="filters-wrap" id="filters-wrap">
    <div class="container">
      <div class="tabs" id="filters" role="tablist"></div>
      <!-- Shuffle button: desktop pins it absolute-left; mobile flex order puts it left of the filter -->
      <button class="shuffle-btn" id="shuffle-btn" type="button" aria-label="Shuffle order" title="Shuffle">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="21 3 21 9 15 9"></polyline>
          <polyline points="3 21 3 15 9 15"></polyline>
          <path d="M3.5 9a9 9 0 0 1 15-3.5L21 9"></path>
          <path d="M20.5 15a9 9 0 0 1-15 3.5L3 15"></path>
        </svg>
      </button>
      <!-- Desktop-only favorites filter: toggle to restrict the gallery to favorited ads. -->
      <button class="favorites-filter-btn" id="favorites-filter-btn" type="button" aria-label="Show favorites" title="Favorites">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

        </svg>
      </button>
      <!-- Desktop-only search: collapsed = icon, expanded = inline input. Green dot when a query is active. -->

        <button class="search-btn" id="search-btn" type="button" aria-label="Search" title="Search">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-3.5-3.5"></path>
          </svg>
          <span class="search-indicator" id="search-indicator" hidden></span>
        </button>
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Search…"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
        />
      </div>
      <div class="dropdown filter-dropdown" id="filter-dropdown">

  <main class="container">

         to each platform's library. Same border + shadow as gallery cards. -->

      <a class="chooser-tile" href="/linkedin-ads" data-platform="linkedin" aria-label="Browse the LinkedIn Ads library">

      <a class="chooser-tile" href="/google-ads" data-platform="google" aria-label="Browse the Google Ads library">

    <button class="lb-nav lb-prev" id="lb-prev" aria-label="Previous">‹</button>

  <!-- Homepage password gate. Only activates when the URL is exactly "/".
       Library and ad URLs (/google-ads, /linkedin-ads/problem-3, etc.) skip this. -->
  <div class="password-gate" id="password-gate" hidden>
    <form class="password-gate-card" id="password-form" autocomplete="off">
      <h2 class="password-gate-title">What's the <span class="password-gate-title-accent">secret password?</span></h2>
      <input
        type="password"
        id="password-input"
        class="password-gate-input"
        placeholder="Enter"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
      />
      <button type="submit" class="password-gate-btn">Unlock</button>
      <p class="password-gate-error" id="password-error" hidden>That's not the right password.</p>
    </form>
    <div class="password-gate-card password-gate-success" id="password-success" hidden>
      <div class="password-gate-tick" aria-hidden="true">
        <svg viewBox="0 0 32 32" fill="none">
          <path d="M7 16.5 L13.5 22.5 L25 10.5" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
