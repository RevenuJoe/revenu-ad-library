<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rounded teal background, matches Revenu brand -->
  <rect width="64" height="64" rx="12" fill="#2f7d6f"/>

  <!-- Ears (behind hat) -->
  <path d="M 14 24 L 20 38 L 24 26 Z" fill="#d96e2a"/>
  <path d="M 50 24 L 44 38 L 40 26 Z" fill="#d96e2a"/>
  <!-- Inner ear -->
  <path d="M 16 26 L 20 34 L 23 27 Z" fill="#f5b48a"/>
  <path d="M 48 26 L 44 34 L 41 27 Z" fill="#f5b48a"/>

  <!-- Face / head -->
  <ellipse cx="32" cy="40" rx="18" ry="18" fill="#d96e2a"/>

  <!-- Hat crown -->
  <path d="M 16 26 Q 16 14, 32 14 Q 48 14, 48 26 L 48 30 L 16 30 Z" fill="#1f5036"/>
  <!-- Hat brim -->
  <ellipse cx="32" cy="30" rx="18" ry="2.5" fill="#163e2a"/>
  <!-- "R" on cap -->
  <text x="32" y="25" font-family="Montserrat, sans-serif" font-weight="900" font-size="11" fill="#fff" text-anchor="middle">R</text>

  <!-- White muzzle -->
  <ellipse cx="32" cy="48" rx="9" ry="6" fill="#fff"/>

  <!-- Glasses -->
  <rect x="20" y="36" width="10" height="8" rx="2" fill="none" stroke="#1c1f1d" stroke-width="1.8"/>
  <rect x="34" y="36" width="10" height="8" rx="2" fill="none" stroke="#1c1f1d" stroke-width="1.8"/>
  <line x1="30" y1="40" x2="34" y2="40" stroke="#1c1f1d" stroke-width="1.8"/>
  <!-- Eyes -->
  <circle cx="25" cy="40" r="1.8" fill="#5a3617"/>
  <circle cx="39" cy="40" r="1.8" fill="#5a3617"/>

  <!-- Nose -->
  <ellipse cx="32" cy="46" rx="1.8" ry="1.4" fill="#1c1f1d"/>
  <!-- Smile -->
  <path d="M 28 50 Q 32 54, 36 50" fill="none" stroke="#1c1f1d" stroke-width="1.2" stroke-linecap="round"/>
</svg>
