<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    if (location.protocol !== 'file:') document.write('<base href="/">');
  </script>
  <title>LinkedIn Ads Library | Revenu</title>
  <meta name="description" content="100+ high-performing ad examples across LinkedIn, Google, and tons of winning landing page formulas too." />

  <!-- Open Graph (Slack / WhatsApp / Facebook / LinkedIn link previews) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://library.revenuagency.io" />
  <meta property="og:title" content="LinkedIn Ads Library | Revenu" />
  <meta property="og:description" content="100+ high-performing ad examples across LinkedIn, Google, and tons of winning landing page formulas too." />
  <meta property="og:image" content="https://library.revenuagency.io/og-image.png" />
  <meta property="og:image:width" content="2314" />
  <meta property="og:image:height" content="1390" />

  <!-- Twitter / X card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="LinkedIn Ads Library | Revenu" />
  <meta name="twitter:description" content="100+ high-performing ad examples across LinkedIn, Google, and tons of winning landing page formulas too." />
  <meta name="twitter:image" content="https://library.revenuagency.io/og-image.png" />

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon/favicon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/favicon-180.png">
  <link rel="shortcut icon" href="favicon/favicon.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="https://www.revenuagency.io" class="brand-logo">REVENU</a>
      <nav class="platform-nav" aria-label="Platform">
        <a href="/google-ads" class="platform-pill" data-platform="google">Google Ads</a>
        <a href="/linkedin-ads" class="platform-pill is-active" data-platform="linkedin">LinkedIn Ads</a>
        <a href="/landing-pages" class="platform-pill" data-platform="landing">Landing Pages</a>
        <div class="dropdown platform-dropdown" id="platform-dropdown">
          <button class="dropdown-trigger" type="button" id="platform-dropdown-trigger" aria-haspopup="listbox" aria-expanded="false">
            <span class="dropdown-label" id="platform-dropdown-label">LinkedIn Ads</span>
            <span class="dropdown-chevron" aria-hidden="true"></span>
          </button>
          <div class="dropdown-menu" id="platform-dropdown-menu" role="listbox"></div>
        </div>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h1 class="hero-title" id="hero-title">
        <span class="hero-title-accent">LinkedIn Ads</span> Library
      </h1>
      <div class="feature-pills" id="feature-pills"></div>
    </div>
  </section>

  <div class="filters-wrap" id="filters-wrap">
    <div class="container">
      <div class="tabs" id="filters" role="tablist"></div>
      <button class="shuffle-btn" id="shuffle-btn" type="button" aria-label="Shuffle order" title="Shuffle">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="21 3 21 9 15 9"></polyline>
          <polyline points="3 21 3 15 9 15"></polyline>
          <path d="M3.5 9a9 9 0 0 1 15-3.5L21 9"></path>
          <path d="M20.5 15a9 9 0 0 1-15 3.5L3 15"></path>
        </svg>
      </button>
      <div class="dropdown filter-dropdown" id="filter-dropdown">
        <button class="dropdown-trigger" type="button" id="filter-dropdown-trigger" aria-haspopup="listbox" aria-expanded="false">
          <span class="dropdown-label" id="filter-dropdown-label"></span>
          <span class="dropdown-chevron" aria-hidden="true"></span>
        </button>
        <div class="dropdown-menu" id="filter-dropdown-menu" role="listbox"></div>
      </div>
      <!-- Desktop-only column toggle -->
      <div class="view-toggle" id="view-toggle" role="radiogroup" aria-label="Column count">
        <button class="view-toggle-btn" type="button" role="radio" data-cols="1" aria-label="1 column" title="1 column">
          <svg width="14" height="12" viewBox="0 0 14 12" aria-hidden="true"><rect x="0" y="0" width="14" height="12" rx="1.5"/></svg>
        </button>
        <button class="view-toggle-btn" type="button" role="radio" data-cols="2" aria-label="2 columns" title="2 columns">
          <svg width="14" height="12" viewBox="0 0 14 12" aria-hidden="true"><rect x="0" y="0" width="6" height="12" rx="1.5"/><rect x="8" y="0" width="6" height="12" rx="1.5"/></svg>
        </button>
        <button class="view-toggle-btn is-active" type="button" role="radio" data-cols="3" aria-label="3 columns" title="3 columns">
          <svg width="14" height="12" viewBox="0 0 14 12" aria-hidden="true"><rect x="0" y="0" width="3" height="12" rx="1"/><rect x="5.5" y="0" width="3" height="12" rx="1"/><rect x="11" y="0" width="3" height="12" rx="1"/></svg>
        </button>
      </div>
    </div>
  </div>

  <main class="container">
    <section class="chooser" id="chooser" hidden aria-label="Choose a library">
      <a class="chooser-tile" href="/google-ads" data-platform="google" aria-label="Browse the Google Ads library">
        <img src="images/Homepage/google-ads.webp" alt="Google Ads library" loading="eager" />
      </a>
      <a class="chooser-tile" href="/linkedin-ads" data-platform="linkedin" aria-label="Browse the LinkedIn Ads library">
        <img src="images/Homepage/linkedin-ads.webp" alt="LinkedIn Ads library" loading="eager" />
      </a>
      <a class="chooser-tile" href="/landing-pages" data-platform="landing" aria-label="Browse the Landing Pages library">
        <img src="images/Homepage/landing-pages.webp" alt="Landing Pages library" loading="eager" />
      </a>
    </section>
    <div id="gallery" class="gallery" aria-live="polite"></div>
    <p id="empty-state" class="empty-state" hidden></p>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© Revenu · Built for marketers who like ads that convert.</p>
    </div>
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Ad preview" hidden>
    <button class="lb-close" id="lb-close" aria-label="Close">×</button>
    <button class="lb-nav lb-prev" id="lb-prev" aria-label="Previous">‹</button>
    <button class="lb-nav lb-next" id="lb-next" aria-label="Next">›</button>
    <figure class="lb-figure">
      <img id="lb-image" alt="" />
      <figcaption id="lb-caption"></figcaption>
    </figure>
  </div>

  <script src="ads.js"></script>
  <script src="app.js"></script>
</body>
</html>
